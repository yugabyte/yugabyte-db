<div class="markdown-actions">
  <button class="copy-link" data-copy-file="{{ .RelPermalink }}">
    <i class="fa fa-copy me-2"></i>
    <span>Copy page as markdown</span>
  </button>
  <button class="copy-dropdown" type="button" data-bs-toggle="dropdown" aria-expanded="false">
    <i class="fa-solid fa-angle-down"></i>
  </button>
  <ul class="dropdown-menu">
    <li>
      <a class="copy-item" href="{{ .RelPermalink }}" target="_blank">View as Markdown</a>
    </li>
  </ul>
</div>
