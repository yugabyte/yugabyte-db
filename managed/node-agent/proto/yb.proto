syntax = "proto3";
package nodeagent.server;

option go_package = "./service";
option java_package = "com.yugabyte.yw.nodeagent";
option java_multiple_files = true;

import "common.proto";

message PreflightCheckInput {
    string ybHomeDir = 1;
    bool skipProvisioning = 2;
    bool airGapInstall = 3;
    bool installNodeExporter = 4;
    uint32 sshPort = 5;
    repeated string mountPaths = 6;
    uint32 masterHttpPort = 7;
    uint32 masterRpcPort = 8;
    uint32 tserverHttpPort = 9;
    uint32 tserverRpcPort = 10;
    uint32 redisServerHttpPort = 11;
    uint32 redisServerRpcPort = 12;
    uint32 nodeExporterPort = 13;
    uint32 ycqlServerHttpPort = 14;
    uint32 ycqlServerRpcPort = 15;
    uint32 ysqlServerHttpPort = 16;
    uint32 ysqlServerRpcPort = 17;
    uint32 ybControllerHttpPort = 18;
    uint32 ybControllerRpcPort = 19;
}

message PreflightCheckOutput {
    repeated NodeConfig nodeConfigs = 1;
}

message NodeConfig {
    string type = 1;
    string value = 2;
}


enum Service {
    EARLYOOM = 0;
}

message GetServiceStateRequest {
    Service service = 1;
}

message EarlyoomState {
    int32 kills_last_hour = 1;
    int32 total_kills = 2;
}

message GetServiceStateResponse {
    bool enabled = 1;
    oneof state {
        EarlyoomState earlyoomState = 2;
    }
}

message EarlyoomConfig {
    optional string startArgs = 1;
}

message ServiceConfig {
    optional string ybHomeDir = 1;
    oneof data {
        EarlyoomConfig earlyoomConfig = 2;
    }
}

message ConfigureServiceInput {
    Service service = 1;
    bool enabled = 2;
    optional ServiceConfig config = 3;
}

message ConfigureServiceOutput {
    Service service = 1;
    bool success = 2;
    optional Error error = 3;
}

enum ServerControlType {
    START = 0;
    STOP = 1;
}

message ServerControlInput {
    ServerControlType controlType = 1;
    string serverName = 2;
    string serverHome = 3;
    bool deconfigure = 4;
    uint32 numVolumes = 5;
}

message ServerControlOutput {
    int32 pid = 1;
}

message InstallSoftwareInput {
    string ybPackage = 1;
    string remoteTmp = 2;
    string ybHomeDir = 3;
    repeated string symLinkFolders = 4;
}

message InstallSoftwareOutput {
    int32 pid = 1;
}

message DownloadSoftwareInput {
    string ybPackage = 1;
    bool s3RemoteDownload = 2;
    string awsAccessKey = 3;
    string awsSecretKey = 4;
    bool gcsRemoteDownload = 5;
    string gcsCredentialsJson = 6;
    bool httpRemoteDownload = 7;
    string httpPackageChecksum = 8;
    string iTestS3PackagePath = 9;
    string remoteTmp = 10;
    string ybHomeDir = 11;
    uint32 numReleasesToKeep = 12;
}

message DownloadSoftwareOutput {
    int32 pid = 1;
}

message ServerGFlagsInput {
    map<string, string> gflags = 1;
    string serverName = 2;
    string serverHome = 3;
    bool resetMasterState = 4;
}

message ServerGFlagsOutput {
}

message InstallYbcInput {
    string ybcPackage = 1;
    string remoteTmp = 2;
    string ybHomeDir = 3;
    repeated string mountPoints = 4;
}

message InstallYbcOutput {
    int32 pid = 1;
}

message ConfigureServerInput {
    string remoteTmp = 1;
    string ybHomeDir = 2;
    repeated string processes = 3;
    repeated string mountPoints = 4;
    uint32 numCoresToKeep = 5;
    bool configureCgroup = 6;
}

message ConfigureServerOutput {
    int32 pid = 1;
}

message InstallOtelCollectorInput {
    string ybHomeDir = 1;
    repeated string mountPoints = 2;
    string otelColPackagePath = 3;
    string ycqlAuditLogLevel = 4;
    string otelColConfigFile = 5;
    string otelColAwsAccessKey = 6;
    string otelColAwsSecretKey = 7;
    string otelColGcpCredsFile = 8;
    string remoteTmp = 9;
    uint32 otelColMaxMemory = 10;
    // Days to keep extracted YSQL audit log archives on the node. 0 = disabled.
    uint32 ysqlAuditLogRetentionDays = 11;
    // Days to keep gzipped YCQL audit log archives on the node. 0 = disabled.
    uint32 ycqlAuditLogRetentionDays = 12;
}

message InstallOtelCollectorOutput {
    int32 pid = 1;
}

message SetupCGroupInput {
    string ybHomeDir = 1;
    uint32 pgMaxMemMb = 2;
}

message SetupCGroupOutput {
    int32 pid = 1;
}

message DestroyServerInput {
    string ybHomeDir = 1;
    bool isProvisioningCleanup = 2;
}

message DestroyServerOutput {
}

message YnpPreflightCheckInput {
    string configJson = 1;
    string remoteTmp = 2;
}

message YnpPreflightCheckOutput {
    uint32 exitCode = 1;
    string output = 2;
}

message RotateSshKeyInput {
    string remoteTmp = 1;
    string sshUser = 2;
    string oldPublicKeyContent = 3;
    string newPublicKeyContent = 4;
}

message RotateSshKeyOutput {
}

// YugabyteProcessRole identifies a YugabyteDB related process on the node.
enum YugabyteProcessRole {
    YB_ROLE_UNKNOWN = 0;
    YB_ROLE_MASTER = 1;
    YB_ROLE_TSERVER = 2;
    YB_ROLE_CONTROLLER = 3;
    YB_ROLE_POSTGRES = 4;
    YB_ROLE_NODE_EXPORTER = 5;
}

// ProcessListener is a single listening socket classified to a role when known.
message ProcessListener {
    uint32 port = 1;
    string protocol = 2;
    int32 pid = 3;
    YugabyteProcessRole role = 4;
    string processName = 5;
}

// ProcessArg is a single key-value argument. Sensitive values are redacted.
message ProcessArg {
    string key = 1;
    string value = 2;
    // Source is one of "cmdline", "flagfile" or "merged".
    string source = 3;
}

// ProcessConfig carries the flagfile and parsed arguments for a process. It is
// only populated for master, tserver and controller when the process is running.
message ProcessConfig {
    string flagfilePath = 1;
    bool flagfileExists = 2;
    bool flagfileReadable = 3;
    repeated ProcessArg cmdlineArgs = 4;
    repeated ProcessArg flagfileArgs = 5;
    // Merged effective arguments (flagfile overlaid by cmdline).
    repeated ProcessArg args = 6;
}

// ProcessStatus is the detected status of a single role.
message ProcessStatus {
    YugabyteProcessRole role = 1;
    bool running = 2;
    // Primary pid when multiple processes match the role.
    int32 pid = 3;
    repeated uint32 listenPorts = 4;
    repeated ProcessListener listeners = 5;
    ProcessConfig config = 6;
}

message CheckYugabyteDbStatusRequest {
}

message CheckYugabyteDbStatusResponse {
    bool masterPresent = 1;
    bool tserverPresent = 2;
    bool controllerPresent = 3;
    bool postgresPresent = 4;
    bool nodeExporterPresent = 5;
    repeated ProcessStatus processes = 6;
    // Listeners classified as YugabyteDB processes on non-default ports.
    repeated ProcessListener otherListeners = 7;
}
