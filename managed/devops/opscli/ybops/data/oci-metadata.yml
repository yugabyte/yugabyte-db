# OCI (Oracle Cloud Infrastructure) metadata for YugabyteDB

credential_vars:
- OCI_TENANCY_ID
- OCI_USER_ID
- OCI_FINGERPRINT
- OCI_REGION
- OCI_COMPARTMENT_ID

region_cidr_format: '{}.0.0/16'

# OCI Regions with availability domains
# Using Oracle Linux 8 as the default image (Platform Images)
# Image OCIDs are region-specific - these are placeholders that should be updated
# per deployment or use the OCI image lookup API
regions:
  us-ashburn-1:
    cidr_prefix: '10.10'
    # Oracle Linux 8 image - actual OCID varies by region
    image: ''
