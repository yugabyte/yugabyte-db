---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: pitrrestores.operator.yugabyte.io
spec:
  group: operator.yugabyte.io
  scope: Namespaced
  names:
    plural: pitrrestores
    singular: pitrrestore
    kind: PitrRestore
    categories:
      - all
      - yugabyte
  versions:
    - name: v1alpha1
      subresources:
        status: {}
      served: true
      storage: true
      schema:
        openAPIV3Schema:
          type: object
          description: Custom resource definition for YugabyteDB PITR restore job
          properties:
            status:
              type: object
              description: PITR restore status for the PITR restore custom resource.
              properties:
                message:
                  description: String log message from PITR restore controller
                  type: string
                taskUUID:
                  description: >
                    Internal UUID of the task associated with
                    the PITR restore resource.
                  type: string
            spec:
              type: object
              description: PITR restore specification
              properties:
                universe:
                  description: >
                    Name of the universe on which PITR restore is to be performed,
                    refers to a ybuniverse CR name.
                  type: string
                  x-kubernetes-validations:
                    - message: universe cannot be changed
                      rule: self == oldSelf
                pitrConfig:
                  description: >
                    Name of the PITR config to use for restore,
                    refers to a pitrconfig CR name.
                  type: string
                  x-kubernetes-validations:
                    - message: pitrConfig cannot be changed
                      rule: self == oldSelf
                restoreTime:
                  description: >
                    The point-in-time to restore to, specified in ISO 8601 / RFC 3339 format.
                    UTC time with 'Z' suffix is recommended (e.g., "2024-02-09T15:30:00Z").
                    Timezone offsets are also supported (e.g., "2024-02-09T10:30:00-05:00").
                    Must be within the PITR config's retention window.
                  type: string
                  format: date-time
                  x-kubernetes-validations:
                    - message: restoreTime cannot be changed
                      rule: self == oldSelf
              required:
                - universe
                - pitrConfig
                - restoreTime
