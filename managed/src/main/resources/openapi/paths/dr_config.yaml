'/customers/{cUUID}/universes/{uniUUID}/dr-configs/page':
  parameters:
    - name: cUUID
      in: path
      description: Customer UUID
      schema:
        type: string
        format: uuid
      explode: false
      style: simple
      required: true
    - name: uniUUID
      in: path
      description: Universe UUID
      schema:
        type: string
        format: uuid
      explode: false
      style: simple
      required: true
  post:
    operationId: pageListDrConfigs
    summary: List disaster recovery configurations.
    description: |
      Returns disaster recovery configurations for the specified universe (as source or target)
      with pagination.
      WARNING: This is a preview API that could change.
    tags:
      - Disaster Recovery
    requestBody:
      $ref: "../components/requestBodies/DrConfigPagedReq.yaml"
    responses:
      '200':
        $ref: "../components/responses/DrConfigPagedResp.yaml"
      '400':
        description: Invalid input
      '500':
        description: Server error
    security:
      - apiKeyAuth: []
    x-yba-api-audit:
      noAudit: true
    x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: READ
        resourceLocation:
          path: universes
          sourceType: endpoint
        checkOnlyPermission: true
    x-yba-api-since: 2026.2.0.0
    x-yba-api-visibility: preview
'/customers/{cUUID}/dr-configs/{drUUID}/tables/page':
  parameters:
    - name: cUUID
      in: path
      description: Customer UUID
      schema:
        type: string
        format: uuid
      explode: false
      style: simple
      required: true
    - name: drUUID
      in: path
      description: DR config UUID
      schema:
        type: string
        format: uuid
      explode: false
      style: simple
      required: true
  post:
    operationId: pageListDrConfigTables
    summary: List DR config table replication details.
    description: |
      Returns paginated table replication details for the specified DR config.
      WARNING: This is a preview API that could change.
    tags:
      - Disaster Recovery
    requestBody:
      $ref: "../components/requestBodies/DrConfigTableDetailPagedReq.yaml"
    responses:
      '200':
        $ref: "../components/responses/DrConfigTableDetailPagedResp.yaml"
      '400':
        description: Invalid input
      '500':
        description: Server error
    security:
      - apiKeyAuth: []
    x-yba-api-audit:
      noAudit: true
    x-yba-api-authz:
      - requiredPermission:
          resourceType: universe
          action: READ
        resourceLocation:
          path: source_universe_uuid
          sourceType: db
          dbClass: com.yugabyte.yw.models.XClusterConfig.class
          identifier: dr-configs
          columnName: dr_config_uuid
      - requiredPermission:
          resourceType: universe
          action: READ
        resourceLocation:
          path: target_universe_uuid
          sourceType: db
          dbClass: com.yugabyte.yw.models.XClusterConfig.class
          identifier: dr-configs
          columnName: dr_config_uuid
    x-yba-api-since: 2026.2.0.0
    x-yba-api-visibility: preview
