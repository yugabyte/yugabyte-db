'/customers/{cUUID}/restores/page':
  parameters:
    - name: cUUID
      in: path
      description: Customer UUID
      schema:
        type: string
        format: uuid
      explode: false
      style: simple
      required: true
  post:
    operationId: pageListRestores
    summary: List universe restores.
    description: |
      Returns universe backup restore events for the specified customer with pagination and optional filters.
      WARNING: This is a preview API that could change.
    tags:
      - Backup and Restore
    requestBody:
      $ref: "../components/requestBodies/RestorePagedReq.yaml"
    responses:
      '200':
        $ref: "../components/responses/RestorePagedResp.yaml"
      '400':
        description: Invalid input
      '500':
        description: Server error
    security:
      - apiKeyAuth: []
    x-yba-api-audit:
      noAudit: true
    x-yba-api-authz:
      - requiredPermission:
          resourceType: other
          action: read
        resourceLocation:
          path: customers
          sourceType: endpoint
        checkOnlyPermission: true
    x-yba-api-since: 2026.2.0.0
    x-yba-api-visibility: preview
