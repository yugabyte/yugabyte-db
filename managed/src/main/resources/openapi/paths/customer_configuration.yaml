'/customers/{cUUID}/customer-configs/page':
  parameters:
    - name: cUUID
      in: path
      description: Customer UUID
      schema:
        type: string
        format: uuid
      explode: false
      style: simple
      required: true
  post:
    operationId: pageListCustomerConfigs
    summary: List customer configurations (paged)
    description: |
      Returns customer configurations for the specified customer with pagination.
      WARNING: This is a preview API that could change.
    tags:
      - Customer Configuration
    requestBody:
      $ref: "../components/requestBodies/CustomerConfigPagedReq.yaml"
    responses:
      '200':
        $ref: "../components/responses/CustomerConfigPagedResp.yaml"
      '400':
        description: Invalid input
      '500':
        description: Server error
    security:
      - apiKeyAuth: []
    x-yba-api-audit:
      noAudit: true
    x-yba-api-authz:
      - requiredPermission:
          resourceType: other
          action: read
        resourceLocation:
          path: customers
          sourceType: endpoint
        checkOnlyPermission: true
    x-yba-api-since: 2026.2.0.0
    x-yba-api-visibility: preview
