title: MemoryLimitedExporterConfig
type: object
description: |
  MemoryLimitedExporterConfig
  Memory limiter tuning shared by exporters that bound collector memory.
properties:
  memory_limit_mib:
    description: Memory limit in MiB for the OpenTelemetry Collector process in the config file.
    type: integer
    example: 2048
    default: 2048
  memory_limit_check_interval_seconds:
    description: Check interval in seconds for the MemoryLimiterProcessor.
    type: integer
    example: 10
    default: 10
