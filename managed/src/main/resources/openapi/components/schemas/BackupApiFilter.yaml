title: BackupApiFilter
description: Optional filter for listing backups.
type: object
properties:
  date_range_start:
    description: Include backups created on or after this time.
    type: string
    format: date-time
  date_range_end:
    description: Include backups created on or before this time.
    type: string
    format: date-time
  states:
    description: Backup states to include.
    type: array
    items:
      $ref: "./BackupState.yaml"
  keyspace_list:
    description: Keyspace names to include.
    type: array
    items:
      type: string
  universe_name_list:
    description: Universe names to include.
    type: array
    items:
      type: string
  storage_config_uuid_list:
    description: Storage config UUIDs to include.
    type: array
    items:
      type: string
      format: uuid
  schedule_uuid_list:
    description: Backup schedule UUIDs to include.
    type: array
    items:
      type: string
      format: uuid
  universe_uuid_list:
    description: Universe UUIDs to include.
    type: array
    items:
      type: string
      format: uuid
  backup_uuid_list:
    description: Backup UUIDs to include.
    type: array
    items:
      type: string
      format: uuid
  only_show_deleted_universes:
    description: 'When true, include backups whose universe has been deleted.'
    type: boolean
  only_show_deleted_configs:
    description: 'When true, include backups whose storage config has been deleted.'
    type: boolean
  show_hidden:
    description: 'When true, include hidden backups.'
    type: boolean
