title: Sleep time after restart
description: Time to wait after restarting a tserver or master process
properties:
  sleep_after_master_restart_millis:
    description: 'Applicable for rolling restarts. Time to wait between master restarts. If unset, runtime config is used.'
    type: integer
  sleep_after_tserver_restart_millis:
    description: 'Applicable for rolling restarts. Time to wait between tserver restarts. If unset, runtime config is used.'
    type: integer
