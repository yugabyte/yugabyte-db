!!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat
exporters:
  datadog/tserver_logs_00000000-0000-0000-0000-000000000000: !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$DataDogExporter
    api: {key: apikey, site: ddsite}
    retry_on_failure: {enabled: true, initial_interval: 30s, max_elapsed_time: 60m,
      max_interval: 10m}
extensions:
  file_storage/queue: !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$StorageExtension
    compaction: {directory: /mnt/d0/otel-collector/queue, on_rebound: true, on_start: true,
      rebound_needed_threshold_mib: 100, rebound_trigger_threshold_mib: 10}
    directory: /mnt/d0/otel-collector/queue
processors:
  attributes/tserver_logs_00000000-0000-0000-0000-000000000000: !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$AttributesProcessor
    actions:
    - {action: upsert, key: ddsource, value: yugabyte}
    - {action: upsert, key: service, value: yb-otel-collector}
    - {action: upsert, key: host, value: test-node}
    - {action: upsert, key: yugabyte.node_name, value: test-node}
    - {action: upsert, key: yugabyte.cloud, value: ''}
    - {action: upsert, key: yugabyte.universe_uuid, value: 00000000-0000-0000-0000-000000000000}
    - {action: upsert, key: yugabyte.node_type, value: PRIMARY}
    - {action: upsert, key: yugabyte.region, value: ''}
    - {action: upsert, key: yugabyte.zone, value: ''}
    - {action: upsert, key: yugabyte.purpose, value: DATA_DOG_TSERVER_LOG_EXPORT}
    - {action: upsert, from_attribute: log.file.name, key: yugabyte.log.file.name}
    - {action: delete, key: log.file.name}
    - {action: upsert, from_attribute: log_level, key: yugabyte.log_level}
    - {action: delete, key: log_level}
    - {action: upsert, key: tag, value: value}
    - {action: upsert, key: additionalTag, value: otherValue}
  batch/tserver_logs_00000000-0000-0000-0000-000000000000: !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$BatchProcessor {
    send_batch_max_size: 1000, send_batch_size: 100, timeout: 10s}
  memory_limiter/tserver_logs_00000000-0000-0000-0000-000000000000: !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$MemoryLimiterProcessor {
    check_interval: 10s, limit_mib: 2048}
  transform/replace: !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$TransformProcessor
    log_statements:
    - context: log
      statements: ['replace_pattern(body, "^otho8Aut", "")']
receivers:
  filelog/tserver: !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$FileLogReceiver
    attributes: {yugabyte.server_log_type: tserver}
    exclude: [/home/yugabyte/tserver/logs/*.gz]
    include: [/home/yugabyte/tserver/logs/yb-tserver.*.INFO.*]
    multiline: {line_start_pattern: '^((otho8Aut)|[IWEF])'}
    operators:
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$FilterOperator {
      drop_ratio: 1.0, expr: 'body contains "Writing version edit" or body contains
        "DETAIL:" or body contains "Intent for transaction w/o metadata" or body contains
        "Colocated Tablet not found for table" or (body contains "READ_REPLICA" or
        (body contains "Skipping add replicas" and body contains "Currently remote
        bootstrapping"))', type: filter}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$FilterOperator {
      expr: 'body matches "^.*AUDIT: user:(.|\\n|\\r|\\s)*$"', type: filter}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$RegexOperator {
      if: 'body matches "^[IWEF]"', on_error: send, regex: '(?s)(?P<log_level>[IWEF])(?P<log_time>\d{4}
        \d{2}:\d{2}:\d{2}[.]\d{6})\s*(?P<thread_id>\d+) (?P<file_name>[^:]+):(?P<file_line>\d+)[]]
        (?P<message>.*)', type: regex_parser}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$FilterOperator {
      drop_ratio: 1.0, expr: (attributes.log_level == "I"), type: filter}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$FilterOperator {
      drop_ratio: 0.999, expr: ((attributes.file_name == "log.cc" and body contains
        "Time spent Fsync log took a long time") or body contains "default Universal
        file being compacted skipping" or body contains "skip_prefix_locks gflag is
        enabled while there are active serializable isolation transactions"), type: filter}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$FilterOperator {
      drop_ratio: 0.75, expr: (body contains "Increasing compaction threads because
        we have" and body contains "level 0 files"), type: filter}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$RegexOperator {
      on_error: send, parse_from: 'attributes["log.file.name"]', regex: 'yb-tserver[.].*[.]log[.]INFO[.](?P<log_year>\d{4}).*',
      type: regex_parser}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$AddOperator {
      field: attributes.log_time_full, if: attributes.log_time != nil, type: add,
      value: EXPR(attributes.log_year + attributes.log_time)}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$TimeParserOperator {
      if: attributes.log_time != nil, layout: '%Y%m%d %H:%M:%S.%f', parse_from: attributes.log_time_full,
      type: time_parser}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$AddOperator {
      field: attributes.log_level, if: attributes.log_level == nil, type: add, value: I}
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$SeverityParserOperator
      mapping: {info: I, warn: W, error: E, fatal: F}
      parse_from: attributes.log_level
      type: severity_parser
    - !!com.yugabyte.yw.common.audit.otel.OtelCollectorConfigFormat$MoveOperator {
      from: attributes.message, if: attributes.message != nil, to: body, type: move}
    poll_interval: 1s
    start_at: beginning
    storage: file_storage/queue
service:
  extensions: [file_storage/queue]
  pipelines:
    logs/tserver_logs_00000000-0000-0000-0000-000000000000:
      exporters: [datadog/tserver_logs_00000000-0000-0000-0000-000000000000]
      processors: [attributes/tserver_logs_00000000-0000-0000-0000-000000000000, batch/tserver_logs_00000000-0000-0000-0000-000000000000,
        memory_limiter/tserver_logs_00000000-0000-0000-0000-000000000000, transform/replace]
      receivers: [filelog/tserver]
  telemetry:
    logs:
      output_paths: [/home/yugabyte/otel-collector/logs/otel-collector.logs]
    metrics: {address: '0.0.0.0:8889'}
